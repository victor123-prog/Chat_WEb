<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victorien AI — Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #12102a;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: #1a1835;
            border-bottom: 0.5px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: #6c5ce7; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
        }
        .avatar i { font-size: 20px; color: #fff; }
        .header-info .name { font-size: 16px; font-weight: 600; color: #f0eeff; letter-spacing: 0.04em; }
        .header-info .status { font-size: 12px; color: #7c6fff; margin-top: 1px; }
        .logout-btn {
            background: rgba(108,92,231,0.12);
            border: 0.5px solid rgba(108,92,231,0.3);
            border-radius: 10px; padding: 7px 14px;
            color: #a09ec0; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            text-decoration: none; transition: background 0.2s;
        }
        .logout-btn:hover { background: rgba(108,92,231,0.22); color: #f0eeff; }
        .logout-btn i { font-size: 16px; }

        /* ── Messages ── */
        .messages {
            flex: 1; overflow-y: auto;
            padding: 24px 20px;
            display: flex; flex-direction: column; gap: 14px;
            scrollbar-width: thin; scrollbar-color: #2d2b4e transparent;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #2d2b4e; border-radius: 4px; }

        .message-row { display: flex; align-items: flex-end; gap: 8px; }
        .message-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            background: #6c5ce7; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
        }
        .msg-avatar i { font-size: 15px; color: #fff; }
        .msg-avatar.user-av { background: #3d3a6b; }

        .bubble { max-width: 68%; padding: 10px 15px; font-size: 14px; line-height: 1.6; }
        .bubble.bot { background: #252244; color: #e8e4ff; border-radius: 4px 14px 14px 14px; }
        .bubble.user { background: #6c5ce7; color: #fff; border-radius: 14px 4px 14px 14px; }
        .bubble.typing { background: #252244; color: #7c6fff; border-radius: 4px 14px 14px 14px; font-style: italic; }

        /* ── Markdown styles ── */
        .bubble.bot code {
            background: #12102a; padding: 2px 6px;
            border-radius: 6px; font-size: 13px; color: #a78bfa;
        }
        .bubble.bot pre {
            background: #12102a; padding: 12px; border-radius: 10px;
            overflow-x: auto; margin: 8px 0; font-size: 13px; color: #e8e4ff;
        }
        .bubble.bot pre code { background: transparent; padding: 0; color: #e8e4ff; }
        .bubble.bot ul, .bubble.bot ol { padding-left: 20px; margin: 6px 0; }
        .bubble.bot li { margin: 3px 0; }
        .bubble.bot p { margin: 4px 0; }
        .bubble.bot strong { color: #c4b5fd; }
        .bubble.bot em { color: #a9a4d4; }
        .bubble.bot h1, .bubble.bot h2, .bubble.bot h3 {
            color: #f0eeff; margin: 8px 0 4px; font-weight: 600;
        }
        .bubble.bot blockquote {
            border-left: 3px solid #6c5ce7; padding-left: 10px;
            color: #a09ec0; margin: 6px 0;
        }

        /* ── Input bar ── */
        .input-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 20px; background: #1a1835;
            border-top: 0.5px solid rgba(255,255,255,0.07); flex-shrink: 0;
        }
        .input-bar input {
            flex: 1; background: #12102a;
            border: 0.5px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 11px 18px;
            color: #e8e4ff; font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        .input-bar input::placeholder { color: #5a5880; }
        .input-bar input:focus { border-color: #6c5ce7; }
        .input-bar input:disabled { opacity: 0.5; }

        .send-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: #6c5ce7; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.2s, transform 0.1s;
        }
        .send-btn:hover { background: #7d6ef5; }
        .send-btn:active { transform: scale(0.94); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .send-btn i { font-size: 18px; color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="avatar"><i class="ti ti-robot"></i></div>
        <div class="header-info">
            <div class="name">VICTORIEN &nbsp; AI</div>
            <div class="status">En ligne</div>
        </div>
    </div>
    <a href="/logout" class="logout-btn">
        <i class="ti ti-logout"></i>
        Déconnexion
    </a>
</div>

<div class="messages" id="messages">
    <div class="message-row bot">
        <div class="msg-avatar"><i class="ti ti-robot"></i></div>
        <div class="bubble bot">Salut ! Je suis Victorien, ton assistant IA. Comment puis-je t'aider aujourd'hui ?</div>
    </div>
</div>

<div class="input-bar">
    <input type="text" id="msgInput" placeholder="Écris ton message..." autocomplete="off">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Envoyer">
        <i class="ti ti-send"></i>
    </button>
</div>

<script>
    const input   = document.getElementById('msgInput');
    const messages = document.getElementById('messages');
    const sendBtn  = document.getElementById('sendBtn');

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    function addMessage(text, type) {
        const row = document.createElement('div');
        row.className = 'message-row ' + (type === 'user' ? 'user' : 'bot');

        const av = document.createElement('div');
        av.className = 'msg-avatar' + (type === 'user' ? ' user-av' : '');
        av.innerHTML = type === 'user'
            ? '<i class="ti ti-user"></i>'
            : '<i class="ti ti-robot"></i>';

        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + type;

        if (type === 'bot') {
            bubble.innerHTML = marked.parse(text);
        } else {
            bubble.textContent = text;
        }

        row.appendChild(av);
        row.appendChild(bubble);
        messages.appendChild(row);
        messages.scrollTop = messages.scrollHeight;

        return bubble;
    }

    async function sendMessage() {
        const msg = input.value.trim();
        if (!msg) return;

        input.value = '';
        input.disabled = true;
        sendBtn.disabled = true;

        addMessage(msg, 'user');

        // Indicateur "en train d'écrire"
        const typingRow = document.createElement('div');
        typingRow.className = 'message-row bot';
        typingRow.innerHTML = `
            <div class="msg-avatar"><i class="ti ti-robot"></i></div>
            <div class="bubble typing">En train d'écrire...</div>
        `;
        messages.appendChild(typingRow);
        messages.scrollTop = messages.scrollHeight;

        try {
            const formData = new FormData();
            formData.append('message', msg);

            const response = await fetch('/send', {
                method: 'POST',
                body: formData
            });

            const reply = await response.text();
            typingRow.remove();
            addMessage(reply, 'bot');

        } catch (error) {
            typingRow.remove();
            addMessage("Erreur de connexion au serveur.", 'bot');
        }

        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
    }
</script>

</body>
</html>
